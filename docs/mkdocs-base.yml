site_name: The Global Groundwater Information System (GGIS)
site_description: "Project technical and user documentation."
site_author: "Kartoza"
docs_dir: ./src
site_dir: ./site
repo_name: "IGRAC-GGIS"
repo_url: "https://github.com/kartoza/IGRAC-GGIS"
edit_uri: "https://github.com/kartoza/IGRAC-GGIS/edit/main/docs/src/"

copyright: IGRAC, Kartoza and Contributors

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.tasklist
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret
  - attr_list # lets us resize images see https://github.com/mkdocs/mkdocs/issues/1678#issuecomment-455500757
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  #- mdx_truly_sane_lists
  - toc:
      permalink: true
      #slugify: !!python/name:pymdownx.slugs.slugify
  - pymdownx.snippets:
      base_path: .
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.snippets:
      base_path: .

nav:
  - Introduction: index.md
  - Tutorials:
      - tutorial/index.md
      - Download Wells: tutorial/download_wells/index.md
  - Developer:
      - developer/index.md
      - Deployment: developer/deployment.md
      - Project Structure:
          - developer/project_structure/index.md
          - GeoNode Customisation: developer/project_structure/geonode.md
          - GWML2: developer/project_structure/gwml2.md
          - Igrac App: developer/project_structure/igrac.md
          - Igrac API and istSOS: developer/project_structure/igrac_api_and_istsos.md
          - Documentation: developer/project_structure/documentation.md
      - Harvester:
          - developer/harvester/index.md
          - (Argentina) Azul BDH: developer/harvester/azul_bdh.md
          - (Austria) eHYD: developer/harvester/ehyd.md
          - (El Salvador) SNET: developer/harvester/el_salvador.md
          - (Estonia) Keskkonnaportaal: developer/harvester/estonia.md
          - (France) Hubeau: developer/harvester/hubeau.md
          - (Germany) Lower Saxony: developer/harvester/lower_saxony.md
          - (International) GIN GW-Info: developer/harvester/gin_gw_info.md
          - (Ireland) EPA Hydronet: developer/harvester/epawebapp.md
          - (Netherlands) BRO: developer/harvester/netherlands.md
          - (New Zealand) GNS CRI: developer/harvester/gns_cri.md
          - (Norway) HydAPI / NVE: developer/harvester/hydapi.md
          - (Norway) Miljødirektoratet: developer/harvester/miljodirektoratet.md
          - (Rwanda) RWB: developer/harvester/rwanda.md
          - (Sweden) SGU: developer/harvester/sgu.md
          - (USA) CIDA / USGS: developer/harvester/cida.md
      - Quality Control: developer/quality_control.md
  - Administration:
      - administration/index.md
      - Geonode Popup: administration/geonode_popup.md
      - Contributors: administration/contributors.md
      - Cache Management: administration/cache.md
